<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Pushpa 🌸</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #020818;
  overflow: hidden;
  width: 100vw;
  height: 100vh;
  font-family: Georgia, serif;
}
canvas { display: block; position: absolute; top: 0; left: 0; }
#dedication {
  position: absolute;
  top: 32px;
  width: 100%;
  text-align: center;
  color: rgba(255,240,200,0.88);
  font-size: 1.35rem;
  letter-spacing: 0.12em;
  text-shadow: 0 0 22px rgba(255,200,120,0.6);
  pointer-events: none;
  z-index: 10;
  font-style: italic;
  opacity: 0;
  transition: opacity 2s ease 1s;
}
#dedication.show { opacity: 1; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="dedication" id="ded">✨ For Pushpa — you bloom like the most beautiful lily ✨</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

const rng = (a, b) => a + Math.random() * (b - a);
const TWO_PI = Math.PI * 2;

// Bloom animation: each lily starts at 0, blooms to its final stage over time
// bloomDelay: seconds before it starts blooming, bloomDur: seconds to fully bloom
const BLOOM_TOTAL_DURATION = 12; // seconds for all flowers to finish blooming

// ---- STARS ----
const STAR_COUNT = 280;
const stars = Array.from({length: STAR_COUNT}, () => ({
  x: rng(0, 1), y: rng(0, 0.75),
  r: rng(0.5, 2.2),
  twinkle: rng(0, TWO_PI),
  twinkleSpeed: rng(1.5, 4.5), // faster twinkle
  twinkleAmp: rng(0.5, 1.0),   // some stars twinkle more than others
  baseAlpha: rng(0.3, 0.9)
}));

// ---- SHOOTING STARS ----
const shooters = [];
let lastShoot = 0;
function spawnShooter() {
  shooters.push({
    x: rng(0.05, 0.85), y: rng(0.02, 0.3),
    len: rng(0.08, 0.18),
    angle: rng(0.25, 0.65),
    progress: 0,
    speed: rng(0.018, 0.032),
    alpha: 1
  });
}
// Spawn more frequently — every 800–2000ms
function scheduleShooter() {
  spawnShooter();
  setTimeout(scheduleShooter, rng(800, 2000));
}
scheduleShooter();

// ---- WIND ----
// Stronger wind: higher amplitudes
function windSway(t, phase, amp) {
  // layered sine for natural gusting feel
  return (
    Math.sin(t * 0.8 + phase) * amp * 0.5 +
    Math.sin(t * 1.6 + phase * 1.4) * amp * 0.3 +
    Math.sin(t * 0.35 + phase * 0.7) * amp * 0.2
  );
}

// ---- GRASS ----
const GRASS_COUNT = 170;
const grass = Array.from({length: GRASS_COUNT}, () => ({
  x: rng(0, 1),
  h: rng(30, 75),
  w: rng(2.5, 5.5),
  phase: rng(0, TWO_PI),
  green: `hsl(${rng(90,130)},${rng(40,65)}%,${rng(22,38)}%)`
})).sort((a, b) => a.h - b.h);

// ---- FIREFLIES ----
const FIREFLY_COUNT = 24;
const fireflies = Array.from({length: FIREFLY_COUNT}, () => ({
  x: rng(0.05, 0.95), y: rng(0.42, 0.88),
  vx: rng(-0.0003, 0.0003), vy: rng(-0.0002, 0.0002),
  phase: rng(0, TWO_PI),
  glowSpeed: rng(0.8, 1.8),
  size: rng(2.5, 4.5)
}));

// ---- LILY PLANTS ----
// Each lily: starts at stage 0 (bud), blooms to finalStage over time
const LILY_COUNT = 11;
function makeLily(idx) {
  const finalStage = rng(0.55, 1.0);
  const delay = rng(0, 8);      // 0–8 seconds before starting
  const dur = rng(4, 9);        // 4–9 seconds to fully bloom
  return {
    x: rng(0.04, 0.96),
    depth: rng(0.5, 1.0),
    phase: rng(0, TWO_PI),
    finalStage,
    currentStage: 0,
    bloomDelay: delay,
    bloomDur: dur,
    hue: rng(330, 360),
    saturation: rng(70, 100),
    lightness: rng(58, 78),
    stemH: rng(65, 135),
  };
}
const lilies = Array.from({length: LILY_COUNT}, makeLily).sort((a, b) => a.depth - b.depth);

// Ease function for smooth bloom
function easeInOut(x) {
  return x < 0.5 ? 2*x*x : 1 - Math.pow(-2*x+2, 2)/2;
}

// ---- GRASS BLADE ----
function drawGrassBlade(gx, baseY, blade, sway) {
  const h = blade.h, w = blade.w;
  const tipX = gx + sway * h * 0.022; // more sway
  const tipY = baseY - h;
  const ctrlX = gx + sway * h * 0.013;
  const ctrlY = baseY - h * 0.55;
  ctx.beginPath();
  ctx.moveTo(gx - w/2, baseY);
  ctx.quadraticCurveTo(ctrlX - w*0.2, ctrlY, tipX, tipY);
  ctx.quadraticCurveTo(ctrlX + w*0.2, ctrlY, gx + w/2, baseY);
  ctx.closePath();
  const grad = ctx.createLinearGradient(gx, baseY, tipX, tipY);
  grad.addColorStop(0, blade.green);
  grad.addColorStop(1, `hsl(${110 + Math.random()*20},52%,52%)`);
  ctx.fillStyle = grad;
  ctx.fill();
}

// ---- LILY PETAL ----
function drawPetal(cx, cy, angle, length, width, color, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(cx, cy);
  ctx.rotate(angle);
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.bezierCurveTo(-width*0.5, -length*0.25, -width*0.6, -length*0.75, 0, -length);
  ctx.bezierCurveTo(width*0.6, -length*0.75, width*0.5, -length*0.25, 0, 0);
  ctx.fillStyle = color;
  ctx.shadowColor = color;
  ctx.shadowBlur = 7;
  ctx.fill();
  ctx.restore();
}

// ---- LILY FLOWER ----
function drawLilyFlower(x, y, stage, hue, sat, light, sway, scale) {
  const s = Math.max(0, Math.min(1, stage));
  if (s < 0.01) {
    // tiny closed bud tip
    ctx.save();
    ctx.translate(x, y);
    ctx.beginPath();
    ctx.ellipse(0, -5*scale, 2*scale, 5*scale, 0, 0, TWO_PI);
    ctx.fillStyle = `hsl(${hue-15},88%,38%)`;
    ctx.fill();
    ctx.restore();
    return;
  }

  const petalL = (12 + s * 30) * scale;
  const petalW = (4 + s * 14) * scale;
  const openAngle = s * 0.55;
  const numPetals = 6;

  for (let i = 0; i < numPetals; i++) {
    const ang = (i / numPetals) * TWO_PI + sway * 0.05;
    const tilt = -Math.PI/2 + openAngle * 1.15;
    const color = `hsl(${hue + i*4},${sat}%,${light + s*10}%)`;
    drawPetal(x, y, ang + tilt, petalL, petalW, color, 0.88 + s*0.1);
  }

  if (s < 0.38) {
    // bud overlay
    ctx.save();
    ctx.translate(x, y);
    const budH = (10 + (1 - s*2.5)*12) * scale;
    const budW = (3.5 + s*5) * scale;
    ctx.beginPath();
    ctx.ellipse(0, -budH*0.5, Math.max(budW,1), Math.max(budH,1), 0, 0, TWO_PI);
    const budG = ctx.createRadialGradient(0,-budH*0.4,0, 0,-budH*0.5,budH);
    budG.addColorStop(0, `hsl(${hue},96%,76%)`);
    budG.addColorStop(1, `hsl(${hue-22},90%,38%)`);
    ctx.fillStyle = budG;
    ctx.globalAlpha = 1 - s*2;
    ctx.fill();
    ctx.restore();
  } else {
    // stamens
    ctx.save();
    ctx.translate(x, y);
    const stamenCount = 6;
    for (let i = 0; i < stamenCount; i++) {
      const a = (i/stamenCount)*TWO_PI + sway*0.06;
      const sl = (4 + s*8) * scale;
      const ex = Math.cos(a)*sl, ey = Math.sin(a)*sl - sl*0.5;
      ctx.beginPath();
      ctx.moveTo(0,0); ctx.lineTo(ex, ey);
      ctx.strokeStyle = `hsl(55,100%,82%)`;
      ctx.lineWidth = 1.1; ctx.globalAlpha = 0.9; ctx.stroke();
      ctx.beginPath();
      ctx.arc(ex, ey, 1.6*scale, 0, TWO_PI);
      ctx.fillStyle = `hsl(42,100%,68%)`; ctx.globalAlpha = 1; ctx.fill();
    }
    ctx.restore();
  }
}

// ---- LILY LEAF ----
function drawLilyLeaf(x, y, angle, length, width, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(x, y);
  ctx.rotate(angle);
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.bezierCurveTo(-width*0.5,-length*0.3, -width*0.55,-length*0.7, 0,-length);
  ctx.bezierCurveTo(width*0.55,-length*0.7, width*0.5,-length*0.3, 0,0);
  const g = ctx.createLinearGradient(0, 0, 0, -length);
  g.addColorStop(0, `hsl(115,58%,18%)`);
  g.addColorStop(1, `hsl(105,52%,36%)`);
  ctx.fillStyle = g; ctx.fill();
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0,-length);
  ctx.strokeStyle = `rgba(110,190,85,0.3)`; ctx.lineWidth = 0.8; ctx.stroke();
  ctx.restore();
}

// ---- DRAW FULL LILY ----
function drawLily(lily, baseY, t) {
  const x = lily.x * W;
  const scale = 0.65 + lily.depth * 0.7;
  // stronger sway for lily stems — amplitude 4.5
  const sway = windSway(t, lily.phase, 4.5);
  const stemH = lily.stemH * scale;
  const topX = x + sway * stemH * 0.018;
  const topY = baseY - stemH;

  // stem
  ctx.beginPath();
  ctx.moveTo(x, baseY);
  ctx.quadraticCurveTo(x + sway * stemH * 0.010, baseY - stemH*0.5, topX, topY);
  ctx.strokeStyle = `hsl(112,45%,20%)`;
  ctx.lineWidth = 2.6 * scale;
  ctx.lineJoin = 'round';
  ctx.stroke();

  const leafL = 30*scale, leafW = 11*scale;
  const leafY1 = baseY - stemH*0.34, leafY2 = baseY - stemH*0.62;
  const leafX = x + sway*stemH*0.006;
  drawLilyLeaf(leafX, leafY1, -0.52 + sway*0.055, leafL, leafW, 0.92);
  drawLilyLeaf(leafX, leafY1, Math.PI+0.52 + sway*0.055, leafL*0.85, leafW*0.85, 0.85);
  drawLilyLeaf(leafX, leafY2, -0.68 + sway*0.06, leafL*0.7, leafW*0.7, 0.80);

  drawLilyFlower(topX, topY, lily.currentStage, lily.hue, lily.saturation, lily.lightness, sway, scale);
}

// ---- MOON ----
function drawMoon() {
  const mx = W*0.82, my = H*0.1, mr = 32;
  const mg = ctx.createRadialGradient(mx-6,my-6,2, mx,my,mr);
  mg.addColorStop(0,'rgba(255,248,210,0.98)');
  mg.addColorStop(0.6,'rgba(240,225,170,0.92)');
  mg.addColorStop(1,'rgba(200,180,100,0)');
  ctx.beginPath(); ctx.arc(mx,my,mr,0,TWO_PI);
  ctx.fillStyle = mg;
  ctx.shadowColor = 'rgba(255,240,160,0.38)'; ctx.shadowBlur = 45;
  ctx.fill(); ctx.shadowBlur = 0;
  ctx.beginPath(); ctx.arc(mx+10,my-4,mr*0.88,0,TWO_PI);
  ctx.fillStyle = 'rgba(2,8,24,0.62)'; ctx.fill();
}

// ---- MAIN LOOP ----
let startTime = null;
const ded = document.getElementById('dedication');

function render(ts) {
  if (!startTime) startTime = ts;
  const elapsed = (ts - startTime) * 0.001; // seconds
  const t = elapsed;

  // Update lily bloom stages
  for (const lily of lilies) {
    if (elapsed < lily.bloomDelay) {
      lily.currentStage = 0;
    } else {
      const progress = Math.min(1, (elapsed - lily.bloomDelay) / lily.bloomDur);
      lily.currentStage = easeInOut(progress) * lily.finalStage;
    }
  }

  // Show dedication after 2s
  if (elapsed > 2) ded.classList.add('show');

  // Sky
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, '#010610');
  sky.addColorStop(0.55, '#05102a');
  sky.addColorStop(0.78, '#0a1a2e');
  sky.addColorStop(1, '#111a0a');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);

  // ---- STARS (more dramatic twinkle) ----
  for (const s of stars) {
    // multi-frequency twinkle for shimmer effect
    const twinkle = 0.5 + 0.5 * Math.sin(t * s.twinkleSpeed + s.twinkle);
    const twinkle2 = 0.5 + 0.5 * Math.sin(t * s.twinkleSpeed * 1.7 + s.twinkle * 2.3);
    const combined = twinkle * 0.6 + twinkle2 * 0.4;
    const alpha = s.baseAlpha * (0.15 + 0.85 * combined * s.twinkleAmp);
    // some stars briefly flash bright
    const flash = combined > 0.92 ? (combined - 0.92) * 12 : 0;
    ctx.globalAlpha = Math.min(1, alpha + flash * 0.4);
    const brightness = 78 + combined * 22 + flash * 15;
    ctx.fillStyle = `hsl(220,${25 + flash*20}%,${Math.min(100,brightness)}%)`;
    const r = s.r * (1 + flash * 0.6);
    ctx.beginPath(); ctx.arc(s.x*W, s.y*H, r, 0, TWO_PI); ctx.fill();
    // tiny cross flare on bright stars
    if (s.r > 1.4 && combined > 0.75) {
      ctx.globalAlpha = (combined - 0.75) * 0.6;
      ctx.strokeStyle = `rgba(200,220,255,0.8)`;
      ctx.lineWidth = 0.5;
      const fx = s.x*W, fy = s.y*H, fl = s.r * 3 * combined;
      ctx.beginPath(); ctx.moveTo(fx-fl,fy); ctx.lineTo(fx+fl,fy); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(fx,fy-fl); ctx.lineTo(fx,fy+fl); ctx.stroke();
    }
  }
  ctx.globalAlpha = 1;

  // ---- SHOOTING STARS ----
  for (let i = shooters.length - 1; i >= 0; i--) {
    const sh = shooters[i];
    sh.progress += sh.speed;
    if (sh.progress > 1.4) { shooters.splice(i, 1); continue; }
    const fade = sh.progress < 0.5 ? sh.progress*2 : Math.max(0, 1-(sh.progress-0.5)*2);
    const sx = sh.x*W + Math.cos(sh.angle)*sh.progress*W*0.45;
    const sy = sh.y*H + Math.sin(sh.angle)*sh.progress*H*0.45;
    const ex = sx - Math.cos(sh.angle)*sh.len*W;
    const ey = sy - Math.sin(sh.angle)*sh.len*W;
    const grad = ctx.createLinearGradient(ex,ey,sx,sy);
    grad.addColorStop(0, `rgba(255,255,255,0)`);
    grad.addColorStop(0.6, `rgba(200,220,255,${fade*0.6})`);
    grad.addColorStop(1, `rgba(255,250,240,${fade})`);
    ctx.beginPath(); ctx.moveTo(ex,ey); ctx.lineTo(sx,sy);
    ctx.strokeStyle = grad; ctx.lineWidth = 1.8; ctx.stroke();
    // glow dot at head
    ctx.beginPath(); ctx.arc(sx,sy,2*fade,0,TWO_PI);
    ctx.fillStyle = `rgba(255,255,240,${fade*0.8})`; ctx.fill();
  }

  drawMoon();

  const groundY = H * 0.72;

  // Ground
  const groundG = ctx.createLinearGradient(0,groundY,0,H);
  groundG.addColorStop(0,'#0d1f0a'); groundG.addColorStop(0.4,'#0a160a'); groundG.addColorStop(1,'#060e06');
  ctx.fillStyle = groundG;
  ctx.fillRect(0, groundY, W, H - groundY);

  // Back grass — amp 4
  for (const blade of grass.filter(g => g.h < 45)) {
    drawGrassBlade(blade.x*W, groundY+4, blade, windSway(t, blade.phase, 4));
  }

  // Back lilies
  for (const lily of lilies.filter(l => l.depth < 0.7)) drawLily(lily, groundY+3, t);

  // Front grass — amp 5.5
  for (const blade of grass.filter(g => g.h >= 45)) {
    drawGrassBlade(blade.x*W, groundY+4, blade, windSway(t, blade.phase, 5.5));
  }

  // Front lilies
  for (const lily of lilies.filter(l => l.depth >= 0.7)) drawLily(lily, groundY+3, t);

  // ---- FIREFLIES ----
  for (const f of fireflies) {
    f.x += f.vx + Math.sin(t*0.4 + f.phase)*0.00018;
    f.y += f.vy + Math.cos(t*0.31 + f.phase*1.3)*0.00012;
    if (f.x < 0.02) f.x = 0.98; if (f.x > 0.98) f.x = 0.02;
    if (f.y < 0.38) f.y = 0.38; if (f.y > 0.92) f.y = 0.92;
    const glow = 0.2 + 0.8*(0.5 + 0.5*Math.sin(t*f.glowSpeed*2.5 + f.phase));
    const fx = f.x*W, fy = f.y*H;
    const gr = ctx.createRadialGradient(fx,fy,0, fx,fy,f.size*5.5*glow);
    gr.addColorStop(0, `rgba(200,255,140,${0.9*glow})`);
    gr.addColorStop(0.3, `rgba(160,255,80,${0.38*glow})`);
    gr.addColorStop(1, `rgba(100,255,50,0)`);
    ctx.beginPath(); ctx.arc(fx,fy,f.size*5.5*glow,0,TWO_PI); ctx.fillStyle=gr; ctx.fill();
    ctx.beginPath(); ctx.arc(fx,fy,f.size*0.65*glow+0.5,0,TWO_PI);
    ctx.fillStyle=`rgba(230,255,190,${0.95*glow})`; ctx.fill();
  }

  ctx.globalAlpha = 1;
  requestAnimationFrame(render);
}

requestAnimationFrame(render);
</script>
</body>
</html>
